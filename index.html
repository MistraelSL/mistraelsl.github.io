<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistrael — Каталог</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        background-color: #050505; /* Темный фон сайта */
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        color: white;
        overflow-x: hidden;
    }

    /* =========================
       НАВБАР
    ========================= */
    .navbar {
        width: 100%;
        height: 70px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 5%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        position: absolute;
        top: 0;
        left: 0;
        z-index: 100;
    }

    .nav-buttons {
        display: flex;
        gap: 40px;
    }

    .nav-button {
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-size: 20px;
        text-transform: uppercase; /* ТЕПЕРЬ БОЛЬШИЕ БУКВЫ */
        letter-spacing: 2px;
        transition: color 0.2s;
    }

    .nav-button:hover {
        color: white;
    }

    /* =========================
       ЦЕНТРАЛЬНАЯ ПАНЕЛЬ
    ========================= */
    .welcome-section {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 100px; /* Отступ от верха */
    }

    .welcome-panel {
        position: relative;
        width: 90vw; /* Ширина как на скрине */
        max-width: 1500px;
        height: 480px; /* Фиксированная высота для правильных пропорций */
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Внутренний контейнер для фона, чтобы он не вылезал за скругления */
    .panel-bg-wrapper {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        overflow: hidden;
        z-index: 1;
    }

    .panel-bg-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.8;
    }

    /* Легкое затемнение фона для читаемости текста */
    .panel-glass-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 40%, transparent 100%);
    }

    /* =========================
       ПЕРСОНАЖ (КАДЖИТКА)
    ========================= */
    .welcome-character {
        position: absolute;
        z-index: 10;
        right: 12%; /* Сдвинута левее от края, как на скрине */
        bottom: -3%; /* Чуть-чуть вылезает за нижний край панели */
        height: 106%; /* Голова внутри панели, не вылезает вверх */
        width: auto;
        pointer-events: none;
        filter: drop-shadow(0 0 20px rgba(180, 220, 255, 0.2));
    }

    /* =========================
       ТЕКСТ И КНОПКА
    ========================= */
    .welcome-content {
        position: absolute;
        z-index: 20;
        left: 8%; /* Отступ текста от левого края панели */
        top: 50%;
        transform: translateY(-50%); /* Центрирование по вертикали */
    }

    .welcome-title {
        margin: 0;
        font-size: 72px; /* Крупный размер */
        font-weight: 800; /* Жирный */
        font-style: italic; /* Наклонный, КАК НА СКРИНЕ */
        line-height: 1.1;
        letter-spacing: 2px;
        text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .welcome-subtitle {
        margin-top: 20px;
        font-size: 20px;
        font-style: normal;
        color: rgba(255,255,255,0.85);
        letter-spacing: 1px;
    }

    .read-button {
        display: inline-block;
        margin-top: 40px;
        padding: 16px 50px;
        border: 1px solid rgba(255,255,255,0.6);
        border-radius: 40px; /* Капсула */
        color: white;
        text-decoration: none;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 3px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(4px);
        transition: background 0.2s, border-color 0.2s;
    }

    .read-button:hover {
        background: rgba(255,255,255,0.15);
        border-color: white;
    }

    /* =========================
       ТОЧКИ ВНИЗУ
    ========================= */
    .welcome-dots {
        margin-top: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    .dot {
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
    }

    .dot.small {
        width: 6px;
        height: 6px;
    }

    .dot.big {
        width: 10px;
        height: 10px;
        background: rgba(255,255,255,0.9);
    }

    /* =========================
       АДАПТИВ
    ========================= */
    @media (max-width: 1200px) {
        .welcome-title { font-size: 56px; }
        .welcome-panel { height: 400px; }
        .welcome-character { right: 5%; }
    }

    @media (max-width: 800px) {
        .welcome-title { font-size: 42px; }
        .welcome-subtitle { font-size: 16px; }
        .welcome-panel { height: 350px; width: 95vw; }
        .welcome-content { left: 5%; }
        .welcome-character { right: -5%; height: 95%; bottom: 0; }
        .nav-buttons { gap: 20px; }
        .nav-button { font-size: 16px; }
    }
</style>
</head>
<body>

<header class="navbar">
    <nav class="nav-buttons">
        <a class="nav-button" href="#characters">ПЕРСОНАЖИ</a>
        <a class="nav-button" href="#themes">ТЕМЫ</a>
    </nav>
</header>

<main>
    <section class="welcome-section">
        
        <!-- Сама стеклянная панель -->
        <div class="welcome-panel">
            
            <!-- Задний фон, который обрезается по закруглениям панели -->
            <div class="panel-bg-wrapper">
                <img class="panel-bg-img" src="forgotten.png" alt="">
                <div class="panel-glass-overlay"></div>
            </div>

            <!-- Каджитка (свободно лежит поверх, может чуть выступать снизу) -->
            <img class="welcome-character" src="shain.png" alt="Шейн">

            <!-- Текст внутри панели -->
            <div class="welcome-content">
                <h1 class="welcome-title">
                    ДОБРО<br>
                    ПОЖАЛОВАТЬ
                </h1>
                <div class="welcome-subtitle">
                    немного обо мне, персонажи, темы
                </div>
                <a class="read-button" href="#about">ЧИТАТЬ</a>
            </div>

        </div>

        <!-- Точки под панелью -->
        <div class="welcome-dots">
            <span class="dot small"></span>
            <span class="dot big"></span>
            <span class="dot small"></span>
        </div>

    </section>
</main>

</body>
</html>
