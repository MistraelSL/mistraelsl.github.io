<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Mistrael — Каталог</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0a;
        color: #fff;
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ====== НАВБАР ====== */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(0, 0, 0, 0.85);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 40px;
        z-index: 100;
        backdrop-filter: blur(10px);
    }

    .navbar a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 1px;
        margin-left: 40px;
        transition: color 0.3s;
    }

    .navbar a:hover {
        color: #fff;
    }

    /* ====== ПРИВЕТСТВЕННАЯ СЕКЦИЯ ====== */
    .welcome-section {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 48px;
        overflow: hidden;
    }

    /* ====== СТЕКЛЯННАЯ ПАНЕЛЬ ====== */
    .welcome-panel {
        position: relative;
        width: 90%;
        max-width: 1200px;
        height: 70vh;
        border-radius: 12px;
        overflow: hidden;
        transform-style: preserve-3d;
        perspective: 1200px;
    }

    /* Задняя стеклянная стенка */
    .panel-back {
        position: absolute;
        top: -6px; left: 6px; right: -6px; bottom: -6px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.04) 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
        z-index: 1;
    }

    /* Фоновое изображение */
    .panel-bg {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 12px;
        z-index: 2;
        overflow: hidden;
    }

    .panel-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
    }

    /* Передняя стеклянная стенка */
    .panel-front {
        position: absolute;
        top: -6px; left: -6px; right: 6px; bottom: -6px;
        border-radius: 12px;
        background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 40%, rgba(255,255,255,0.03) 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 10px 30px rgba(0, 0, 0, 0.3);
        z-index: 4;
        pointer-events: none;
    }

    /* Внутренняя рамка на передней стенке */
    .panel-front::after {
        content: '';
        position: absolute;
        top: 14px; left: 14px; right: 14px; bottom: 14px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
    }

    /* Блик на передней стенке */
    .panel-front-glare {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 12px;
        opacity: 0;
        transition: opacity 0.3s;
        background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.12) 0%, rgba(200,220,255,0.04) 30%, transparent 55%);
        z-index: 5;
        pointer-events: none;
    }

    .welcome-panel:hover .panel-front-glare {
        opacity: 1;
    }

    /* Градиент по краям — поверх всего включая каджитку */
    .panel-edge-gradient {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 12px;
        background:
            linear-gradient(to right, #0a0a0a 0%, transparent 15%, transparent 85%, #0a0a0a 100%),
            linear-gradient(to bottom, transparent 0%, transparent 70%, #0a0a0a 100%),
            linear-gradient(to bottom, #0a0a0a 0%, transparent 8%);
        z-index: 7;
        pointer-events: none;
    }

    /* ====== КАДЖИТКА ====== */
    .welcome-character {
        position: absolute;
        right: 5%;
        bottom: 0;
        height: 95%;
        z-index: 6;
        pointer-events: none;
    }

    .welcome-character img {
        height: 100%;
        width: auto;
        object-fit: contain;
    }

    /* ====== ТЕКСТ ПОВЕРХ ПАНЕЛИ ====== */
    .welcome-text {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 5;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 60px;
        pointer-events: none;
    }

    .welcome-title {
        font-size: 52px;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
        margin-bottom: 20px;
    }

    .welcome-subtitle {
        font-size: 15px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.8);
        margin-bottom: 30px;
        max-width: 350px;
    }

    .welcome-btn {
        display: inline-block;
        padding: 12px 36px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 4px;
        color: #fff;
        font-size: 15px;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        pointer-events: all;
        transition: all 0.3s;
        background: rgba(255, 255, 255, 0.05);
        width: fit-content;
    }

    .welcome-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.8);
    }

    /* ====== ТОЧКИ-РАЗДЕЛИТЕЛИ ====== */
    .dots-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 30px 0;
    }

    .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transition: transform 0.3s, background 0.3s;
        cursor: default;
    }

    .dot-center {
        width: 10px;
        height: 10px;
        background: rgba(255, 255, 255, 0.6);
    }

    .dot:hover {
        transform: scale(1.8);
        background: rgba(255, 255, 255, 0.9);
    }

    /* ====== ЗАГЛУШКА ДЛЯ СЛЕДУЮЩЕЙ СЕКЦИИ ====== */
    .next-section-placeholder {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.15);
        font-size: 18px;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

    <!-- НАВБАР -->
    <nav class="navbar">
        <a href="#characters">персонажи</a>
        <a href="#themes">темы</a>
    </nav>

    <!-- ПРИВЕТСТВЕННАЯ СЕКЦИЯ -->
    <section class="welcome-section">
        <div class="welcome-panel" id="welcomePanel">
            <!-- Задняя стенка -->
            <div class="panel-back"></div>

            <!-- Фон -->
            <div class="panel-bg">
                <img src="forgotten.png" alt="Background">
            </div>

            <!-- Текст -->
            <div class="welcome-text">
                <div class="welcome-title">ДОБРО<br>ПОЖАЛОВАТЬ</div>
                <div class="welcome-subtitle">немного обо мне, персонажи, темы</div>
                <div class="welcome-btn" id="readBtn">ЧИТАТЬ</div>
            </div>

            <!-- Каджитка — поверх панели -->
            <div class="welcome-character">
                <img src="shain.png" alt="Shain">
            </div>

            <!-- Передняя стенка -->
            <div class="panel-front">
                <div class="panel-front-glare" id="panelGlare"></div>
            </div>

            <!-- Градиент по краям -->
            <div class="panel-edge-gradient"></div>
        </div>
    </section>

    <!-- ТОЧКИ-РАЗДЕЛИТЕЛИ -->
    <div class="dots-divider">
        <div class="dot"></div>
        <div class="dot dot-center"></div>
        <div class="dot"></div>
    </div>

    <!-- ЗАГЛУШКА СЛЕДУЮЩЕЙ СЕКЦИИ -->
    <div class="next-section-placeholder" id="characters">
        — здесь будет колесо фандомов —
    </div>

    <script>
        // Блик на панели по курсору
        const panel = document.getElementById('welcomePanel');
        const glare = document.getElementById('panelGlare');

        panel.addEventListener('mousemove', (e) => {
            const rect = panel.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            glare.style.setProperty('--mx', `${x}px`);
            glare.style.setProperty('--my', `${y}px`);
        });
    </script>

</body>
</html>
