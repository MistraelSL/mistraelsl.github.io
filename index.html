<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Mistrael — Каталог</title>
<style>
    body {
        margin: 0;
        background-color: #0a0a0a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card-wrapper {
        perspective: 1000px;
        width: 300px;
        height: 450px;
    }

    .hsr-card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.15s ease-out;
        cursor: pointer;
    }

    /* === ПЛАСТИКОВЫЙ ЧЕХОЛ (топлоадер) === */
    .card-sleeve {
        position: absolute;
        top: -12px;
        left: -12px;
        right: -12px;
        bottom: -12px;
        border-radius: 16px;
        transform: translateZ(40px);
        pointer-events: none;

        /* Толщина чехла */
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        background: linear-gradient(
            135deg,
            rgba(255,255,255,0.08) 0%,
            rgba(255,255,255,0.02) 40%,
            rgba(255,255,255,0.06) 60%,
            rgba(255,255,255,0.01) 100%
        );
        box-shadow:
            inset 0 0 30px rgba(255,255,255,0.05),
            0 15px 40px rgba(0,0,0,0.6);
    }

    /* === КАРТИНКА (дно карточки) === */
    .card-image {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        transform: translateZ(0px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.6);
    }

    .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* === ВНУТРЕННЯЯ РАМКА (золотистая граница вокруг арта) === */
    .card-inner-border {
        position: absolute;
        top: 6px;
        left: 6px;
        right: 6px;
        bottom: 6px;
        border: 1.5px solid rgba(255, 215, 140, 0.35);
        border-radius: 6px;
        transform: translateZ(5px);
        pointer-events: none;
    }

    /* === ГОЛОГРАФИЧЕСКИЙ БЛИК === */
    .holo-glare {
        position: absolute;
        top: -12px;
        left: -12px;
        right: -12px;
        bottom: -12px;
        border-radius: 16px;
        transform: translateZ(45px);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        mix-blend-mode: color-dodge;

        /* Радужный градиент, бегающий за мышью */
        background: radial-gradient(
            circle at var(--mx, 50%) var(--my, 50%),
            rgba(255, 120, 200, 0.5) 0%,
            rgba(120, 200, 255, 0.4) 15%,
            rgba(200, 255, 120, 0.3) 30%,
            rgba(255, 200, 100, 0.2) 45%,
            transparent 60%
        );
    }

    .card-wrapper:hover .holo-glare {
        opacity: 1;
    }

    /* === СПЕКТРАЛЬНЫЕ ПОЛОСЫ (линии на стекле при наклоне) === */
    .spectral-lines {
        position: absolute;
        top: -12px;
        left: -12px;
        right: -12px;
        bottom: -12px;
        border-radius: 16px;
        transform: translateZ(42px);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;

        background: repeating-linear-gradient(
            var(--angle, 120deg),
            transparent 0px,
            rgba(255, 255, 255, 0.03) 2px,
            transparent 4px,
            rgba(200, 220, 255, 0.04) 8px,
            transparent 12px
        );
    }

    .card-wrapper:hover .spectral-lines {
        opacity: 1;
    }

    /* === ОТРАЖЕНИЕ-БЛИК (белая вспышка на углу) === */
    .corner-shine {
        position: absolute;
        top: -12px;
        left: -12px;
        right: -12px;
        bottom: -12px;
        border-radius: 16px;
        transform: translateZ(48px);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;

        background: radial-gradient(
            ellipse at var(--mx, 30%) var(--my, 30%),
            rgba(255, 255, 255, 0.25) 0%,
            transparent 35%
        );
    }

    .card-wrapper:hover .corner-shine {
        opacity: 1;
    }
</style>
</head>
<body>

    <div class="card-wrapper">
        <div class="hsr-card" id="card">

            <div class="card-image">
                <img src="david.png" alt="David">
            </div>

            <div class="card-inner-border"></div>
            <div class="card-sleeve"></div>
            <div class="spectral-lines" id="spectral"></div>
            <div class="holo-glare" id="holo"></div>
            <div class="corner-shine" id="shine"></div>

        </div>
    </div>

    <script>
        const wrapper = document.querySelector('.card-wrapper');
        const card = document.getElementById('card');
        const holo = document.getElementById('holo');
        const shine = document.getElementById('shine');
        const spectral = document.getElementById('spectral');

        wrapper.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            // Наклон
            const rotateX = ((y - centerY) / centerY) * -12;
            const rotateY = ((x - centerX) / centerX) * 12;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

            // Позиция мыши в процентах (для бликов)
            const pxStr = `${x + 12}px`;
            const pyStr = `${y + 12}px`;

            holo.style.setProperty('--mx', pxStr);
            holo.style.setProperty('--my', pyStr);
            shine.style.setProperty('--mx', pxStr);
            shine.style.setProperty('--my', pyStr);

            // Угол спектральных полос зависит от позиции мыши
            const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
            spectral.style.setProperty('--angle', `${angle}deg`);
        });

        wrapper.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>

</body>
</html>
