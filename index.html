<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Mistrael — Каталог</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #0a0a0a;
        color: #fff;
        font-family: 'Segoe UI', Arial, sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ====== НАВБАР ====== */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: rgba(0, 0, 0, 0.9);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 40px;
        z-index: 100;
        backdrop-filter: blur(10px);
    }

    .navbar a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 1px;
        margin-left: 40px;
        transition: color 0.3s;
    }

    .navbar a:hover {
        color: #fff;
    }

    /* ====== ПРИВЕТСТВЕННАЯ СЕКЦИЯ ====== */
    .welcome-section {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-top: 48px;
    }

    /* ====== СТЕКЛЯННАЯ СБОРКА ====== */
    .welcome-assembly {
        position: relative;
        width: 92%;
        max-width: 1400px;
        height: 380px;
        transform-style: preserve-3d;
        perspective: 1200px;
    }

    /* Задняя стеклянная стенка */
    .panel-back {
        position: absolute;
        top: -6px; left: 8px; right: -8px; bottom: -6px;
        border-radius: 14px;
        transform: translateZ(-20px);
        background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.04) 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
    }

    /* Фон внутри */
    .panel-bg {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 12px;
        overflow: hidden;
        transform: translateZ(0);
    }

    .panel-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 30%;
    }

    /* Затемнение сверху и снизу ВНУТРИ панели — не трогает стеклянные рамки */
    .panel-bg-gradient {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background:
            linear-gradient(to bottom, rgba(10,10,10,0.6) 0%, transparent 25%),
            linear-gradient(to top, rgba(10,10,10,0.8) 0%, transparent 30%);
        z-index: 1;
    }

    /* Передняя стеклянная стенка */
    .panel-front {
        position: absolute;
        top: -6px; left: -8px; right: 8px; bottom: -6px;
        border-radius: 14px;
        transform: translateZ(30px);
        background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 40%, rgba(255,255,255,0.03) 100%);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 8px 25px rgba(0, 0, 0, 0.3);
        pointer-events: none;
    }

    /* Внутренняя рамка */
    .panel-front::after {
        content: '';
        position: absolute;
        top: 12px; left: 12px; right: 12px; bottom: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
    }

    /* Блик */
    .panel-front-glare {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 14px;
        opacity: 0;
        transition: opacity 0.3s;
        background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.12) 0%, rgba(200,220,255,0.04) 30%, transparent 55%);
        pointer-events: none;
    }

    .welcome-assembly:hover .panel-front-glare {
        opacity: 1;
    }

    /* Грани стекла */
    .edge-right {
        position: absolute;
        top: -6px; right: 8px; width: 4px; bottom: -6px;
        transform: translateZ(15px) rotateY(90deg);
        transform-origin: right center;
        background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0.08) 100%);
        pointer-events: none;
    }

    .edge-bottom {
        position: absolute;
        left: -8px; right: 8px; bottom: -6px; height: 4px;
        transform: translateZ(15px) rotateX(-90deg);
        transform-origin: center bottom;
        background: linear-gradient(90deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.04) 100%);
        pointer-events: none;
    }

    /* ====== КАДЖИТКА ====== */
    .welcome-character {
        position: absolute;
        right: 8%;
        bottom: -20px;
        height: 110%;
        z-index: 10;
        pointer-events: none;
    }

    .welcome-character img {
        height: 100%;
        width: auto;
        object-fit: contain;
    }

    /* ====== ТЕКСТ ====== */
    .welcome-text {
        position: absolute;
        top: 0; left: 0; bottom: 0;
        z-index: 9;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 50px 60px;
    }

    .welcome-title {
        font-size: 48px;
        font-weight: 700;
        font-style: italic;
        line-height: 1.1;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.9);
        margin-bottom: 18px;
    }

    .welcome-subtitle {
        font-size: 14px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.6);
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.9);
        margin-bottom: 28px;
        max-width: 300px;
    }

    .welcome-btn {
        display: inline-block;
        padding: 12px 40px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 30px;
        color: #fff;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.3s;
        background: rgba(255, 255, 255, 0.05);
        width: fit-content;
    }

    .welcome-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.8);
    }

    /* ====== ТОЧКИ-РАЗДЕЛИТЕЛИ ====== */
    .dots-divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 40px 0;
    }

    .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.35);
        transition: transform 0.3s, background 0.3s;
        cursor: default;
    }

    .dot-center {
        width: 8px;
        height: 8px;
        background: rgba(255, 255, 255, 0.55);
    }

    .dot:hover {
        transform: scale(1.8);
        background: rgba(255, 255, 255, 0.9);
    }

    /* ====== ЗАГЛУШКА ====== */
    .next-section-placeholder {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.12);
        font-size: 16px;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

    <!-- НАВБАР -->
    <nav class="navbar">
        <a href="#characters">персонажи</a>
        <a href="#themes">темы</a>
    </nav>

    <!-- ПРИВЕТСТВЕННАЯ СЕКЦИЯ -->
    <section class="welcome-section">
        <div class="welcome-assembly" id="welcomePanel">
            <!-- Задняя стенка -->
            <div class="panel-back"></div>

            <!-- Фон -->
            <div class="panel-bg">
                <img src="forgotten.png" alt="Background">
                <div class="panel-bg-gradient"></div>
            </div>

            <!-- Текст -->
            <div class="welcome-text">
                <div class="welcome-title">ДОБРО<br>ПОЖАЛОВАТЬ</div>
                <div class="welcome-subtitle">немного обо мне, персонажи, темы</div>
                <div class="welcome-btn" id="readBtn">ЧИТАТЬ</div>
            </div>

            <!-- Каджитка -->
            <div class="welcome-character">
                <img src="shain.png" alt="Shain">
            </div>

            <!-- Грани -->
            <div class="edge-right"></div>
            <div class="edge-bottom"></div>

            <!-- Передняя стенка -->
            <div class="panel-front">
                <div class="panel-front-glare" id="panelGlare"></div>
            </div>
        </div>
    </section>

    <!-- ТОЧКИ -->
    <div class="dots-divider">
        <div class="dot"></div>
        <div class="dot dot-center"></div>
        <div class="dot"></div>
    </div>

    <!-- ЗАГЛУШКА -->
    <div class="next-section-placeholder" id="characters">
        — здесь будет колесо фандомов —
    </div>

    <script>
        const panel = document.getElementById('welcomePanel');
        const glare = document.getElementById('panelGlare');

        panel.addEventListener('mousemove', (e) => {
            const rect = panel.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            glare.style.setProperty('--mx', `${x}px`);
            glare.style.setProperty('--my', `${y}px`);
        });
    </script>

</body>
</html>
