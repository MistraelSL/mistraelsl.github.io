<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Mistrael — Каталог</title>
<style>
    body {
        margin: 0;
        background-color: #0a0a0a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
    }

    /* Контейнер — даёт перспективу */
    .card-wrapper {
        perspective: 1000px;
        width: 300px;
        height: 450px;
    }

    /* Сама карточка — теперь это 3D-пространство */
    .hsr-card {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d; /* ВАЖНО: разрешает слоям отрываться друг от друга */
        transition: transform 0.1s ease-out;
    }

    /* Слой 1: Картинка Дэвида (лежит на дне) */
    .card-image {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        transform: translateZ(0px); /* Нулевая высота */
    }

    .card-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Слой 2: Стеклянная рамка (ВИСИТ НАД КАРТИНКОЙ НА 50 ПИКСЕЛЕЙ) */
    .card-glass {
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        border-radius: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        transform: translateZ(50px); /* Вот она, 3D-глубина. Рамка выпирает на нас */
        pointer-events: none;
        box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Слой 3: Блик, который бегает по зависшему стеклу */
    .glare {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 14px;
        background: radial-gradient(
            circle at var(--mouseX) var(--mouseY), 
            rgba(255, 255, 255, 0.6) 0%, 
            rgba(255, 255, 255, 0) 50%
        );
        mix-blend-mode: overlay;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .card-wrapper:hover .glare {
        opacity: 1;
    }
</style>
</head>
<body>

    <div class="card-wrapper">
        <div class="hsr-card" id="card">
            
            <!-- Нижний слой -->
            <div class="card-image">
                <img src="david.png" alt="David">
            </div>

            <!-- Верхний парящий слой (стекло + рамка + блик) -->
            <div class="card-glass">
                <div class="glare" id="glare"></div>
            </div>

        </div>
    </div>

    <script>
        const wrapper = document.querySelector('.card-wrapper');
        const card = document.getElementById('card');
        const glare = document.getElementById('glare');

        wrapper.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left; 
            const y = e.clientY - rect.top;  
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            // Наклон карточки
            const rotateX = ((y - centerY) / centerY) * -15; 
            const rotateY = ((x - centerX) / centerX) * 15;

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // Двигаем блик по стеклу
            glare.style.setProperty('--mouseX', `${x + 10}px`);
            glare.style.setProperty('--mouseY', `${y + 10}px`);
        });

        wrapper.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>

</body>
</html>
